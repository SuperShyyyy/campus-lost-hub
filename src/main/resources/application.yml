# =============================================================
# 公共配置 —— 所有环境共享
# 激活指定 profile 后，Spring Boot 自动加载 application-{profile}.yml
# =============================================================
spring:
  application:
    name: lost-hub
  profiles:
    active: dev
  jackson:
    deserialization:
      fail-on-unknown-properties: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

lost-hub:
  ai:
    memory:
      ttl: 30m
      max-messages: 10
  image-embedding:
    enabled: true
    dimension: 512
  websocket:
    allowed-origins: "*"
  trust-proxy-headers: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /api/doc.html
    tags-sorter: alpha
    operations-sorter: alpha
    try-it-out-enabled: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.hub.domain.po

langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${lost-hub.ai.api-key}
      model-name: qwen-plus
      log-requests: false
      log-responses: false
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${lost-hub.ai.api-key}
      model-name: qwen-plus
      log-requests: false
      log-responses: false
    embedding-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${lost-hub.ai.api-key}
      model-name: text-embedding-v4
      dimensions: 1024
      log-requests: false
      log-responses: false
